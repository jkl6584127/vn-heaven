<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <base href="/platform/admin/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用戶管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <div id="app">
    <div class="main-content">
      <div class="page-header">
        <h1>用戶管理</h1>
        <p>管理平台用戶</p>
      </div>

      <div class="search-bar">
        <input type="text" class="form-control" id="searchInput" placeholder="搜尋用戶...">
        <select class="form-control" id="roleFilter" style="max-width:160px">
          <option value="">所有角色</option>
          <option value="admin">管理員</option>
          <option value="merchant">商家</option>
          <option value="user">用戶</option>
        </select>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead><tr><th>姓名</th><th>帳號</th><th>電子信箱</th><th>角色</th><th>狀態</th><th>加入日期</th><th>操作</th></tr></thead>
            <tbody id="userTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/db.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    const me = Auth.requireRole(['admin']);
    if (me) {
      initSidebar('admin', 'users.html');

      const roleLabels = {admin:'管理員',merchant:'商家',user:'用戶'};
      const statusLabels = {active:'啟用中',suspended:'已停用'};

      function render() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const role = document.getElementById('roleFilter').value;
        let users = DB.getAll('users');
        if (search) users = users.filter(u => u.name.toLowerCase().includes(search) || u.email.toLowerCase().includes(search));
        if (role) users = users.filter(u => u.role === role);

        document.getElementById('userTable').innerHTML = users.length ? users.map(u => `
          <tr>
            <td><strong>${u.name}</strong></td>
            <td>${u.username}</td>
            <td>${u.email}</td>
            <td><span class="badge badge-gold">${roleLabels[u.role]||u.role}</span></td>
            <td><span class="badge badge-${u.status==='active'?'success':'danger'}">${statusLabels[u.status]||u.status}</span></td>
            <td>${u.createdAt}</td>
            <td>
              ${u.id !== me.id ? `<button class="btn btn-sm ${u.status==='active'?'btn-danger':'btn-success'}" onclick="toggleStatus('${u.id}')">${u.status==='active'?'停用':'啟用'}</button>` : '<span class="text-muted">-</span>'}
            </td>
          </tr>
        `).join('') : '<tr><td colspan="7" class="text-center text-muted" style="padding:40px">查無用戶</td></tr>';
      }

      window.toggleStatus = function(id) {
        const u = DB.findById('users', id);
        if (u) {
          DB.update('users', id, { status: u.status === 'active' ? 'suspended' : 'active' });
          render();
          showToast('用戶狀態已更新');
        }
      };

      document.getElementById('searchInput').addEventListener('input', render);
      document.getElementById('roleFilter').addEventListener('change', render);
      render();
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }
  </script>
</body>
</html>
