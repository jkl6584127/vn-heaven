<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人檔案</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .profile-header { display: flex; align-items: center; gap: 24px; margin-bottom: 30px; }
    .profile-avatar { width: 80px; height: 80px; background: var(--gold); color: var(--bg-dark); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; }
    .profile-name { font-size: 1.4rem; font-weight: 700; }
    .profile-role { color: var(--text-muted); text-transform: capitalize; }
  </style>
</head>
<body class="page-topnav">
  <div class="main-content">
      <div class="page-header">
        <h1>個人檔案</h1>
        <p>管理您的帳號資訊</p>
      </div>

      <div id="guestPrompt" style="display:none">
        <div class="guest-prompt">
          <div class="guest-icon">👤</div>
          <h2>請先登入</h2>
          <p>登入後即可管理您的個人檔案</p>
          <button class="btn btn-primary" onclick="showLoginModal()">登入</button>
        </div>
      </div>

      <div id="profileContent">
        <div class="card">
          <div class="profile-header">
            <div class="profile-avatar" id="profileAvatar"></div>
            <div>
              <div class="profile-name" id="profileName"></div>
              <div class="profile-role" id="profileRole"></div>
            </div>
          </div>

          <form id="profileForm">
            <div class="form-row">
              <div class="form-group">
                <label>姓名</label>
                <input type="text" class="form-control" id="name" required>
              </div>
              <div class="form-group">
                <label>帳號</label>
                <input type="text" class="form-control" id="username" disabled>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>電子信箱</label>
                <input type="email" class="form-control" id="email" required>
              </div>
              <div class="form-group">
                <label>電話</label>
                <input type="text" class="form-control" id="phone">
              </div>
            </div>
            <button type="submit" class="btn btn-primary">儲存變更</button>
          </form>
        </div>

        <div class="card">
          <div class="card-header"><h2>更改密碼</h2></div>
          <form id="passwordForm">
            <div class="form-row">
              <div class="form-group">
                <label>目前密碼</label>
                <input type="password" class="form-control" id="currentPw" required>
              </div>
              <div class="form-group">
                <label>新密碼</label>
                <input type="password" class="form-control" id="newPw" required minlength="4">
              </div>
            </div>
            <button type="submit" class="btn btn-primary">更新密碼</button>
          </form>
        </div>

        <div class="card">
          <div class="card-header"><h2>帳號統計</h2></div>
          <div class="stats-grid" id="accountStats"></div>
        </div>
      </div>
    </div>

  <script src="../js/db.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    const me = Auth.getCurrentUser();
    buildTopNav('home');

    if (!me) {
      document.getElementById('guestPrompt').style.display = '';
      document.getElementById('profileContent').style.display = 'none';
    } else {
      const roleLabel = { admin: '管理員', merchant: '商家', user: '用戶' };

      document.getElementById('profileAvatar').textContent = me.name[0];
      document.getElementById('profileName').textContent = me.name;
      document.getElementById('profileRole').textContent = roleLabel[me.role] || me.role;
      document.getElementById('name').value = me.name;
      document.getElementById('username').value = me.username;
      document.getElementById('email').value = me.email;
      document.getElementById('phone').value = me.phone || '';

      const orders = DB.getAll('orders').filter(o => o.userId === me.id);
      const totalSpent = orders.reduce((s,o) => s+o.total, 0);
      document.getElementById('accountStats').innerHTML = `
        <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-value">${orders.length}</div><div class="stat-label">總訂單數</div></div>
        <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-value">NT$${totalSpent.toLocaleString()}</div><div class="stat-label">總消費</div></div>
        <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-value">${me.createdAt}</div><div class="stat-label">加入日期</div></div>
      `;

      document.getElementById('profileForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const updates = {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value,
        };
        DB.update('users', me.id, updates);
        const updated = DB.findById('users', me.id);
        localStorage.setItem('currentUser', JSON.stringify(updated));
        document.getElementById('profileAvatar').textContent = updated.name[0];
        document.getElementById('profileName').textContent = updated.name;
        showToast('個人檔案已更新');
      });

      document.getElementById('passwordForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const current = document.getElementById('currentPw').value;
        const newPw = document.getElementById('newPw').value;
        if (current !== me.password) { showToast('目前密碼不正確'); return; }
        DB.update('users', me.id, { password: newPw });
        const updated = DB.findById('users', me.id);
        localStorage.setItem('currentUser', JSON.stringify(updated));
        document.getElementById('currentPw').value = '';
        document.getElementById('newPw').value = '';
        showToast('密碼已更新');
      });
    }

    function showToast(msg) {
      const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
      document.body.appendChild(t); setTimeout(()=>t.remove(),2500);
    }
  </script>
</body>
</html>
