<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VN Heaven - 購物商城</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body class="page-topnav">
  <div class="main-content">
      <div class="page-header">
        <h1>購物商城</h1>
        <p>瀏覽可靠商家的商品</p>
      </div>

      <div class="search-bar">
        <input type="text" class="form-control" id="searchInput" placeholder="搜尋商品...">
        <select class="form-control" id="catFilter" style="max-width:200px">
          <option value="">所有分類</option>
        </select>
        <select class="form-control" id="sortFilter" style="max-width:180px">
          <option value="default">排序方式</option>
          <option value="price-low">價格：低到高</option>
          <option value="price-high">價格：高到低</option>
          <option value="popular">最熱門</option>
        </select>
      </div>

      <div class="filter-tabs" id="categoryTabs"></div>

      <div class="product-grid" id="productGrid"></div>
    </div>

  <script src="../js/db.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    const me = Auth.getCurrentUser();
    buildTopNav('shop');

    const categories = DB.getAll('categories');
    const catOptions = categories.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
    document.getElementById('catFilter').innerHTML = '<option value="">所有分類</option>' + catOptions;

    document.getElementById('categoryTabs').innerHTML =
      '<button class="filter-tab active" data-cat="">全部</button>' +
      categories.map(c => `<button class="filter-tab" data-cat="${c.id}">${c.icon} ${c.name}</button>`).join('');

    let selectedCat = '';

    function render() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const cat = selectedCat || document.getElementById('catFilter').value;
      const sort = document.getElementById('sortFilter').value;

      let products = DB.getAll('products').filter(p => p.status === 'active');
      if (search) products = products.filter(p => p.name.toLowerCase().includes(search) || p.description.toLowerCase().includes(search));
      if (cat) products = products.filter(p => p.category === cat);

      if (sort === 'price-low') products.sort((a,b) => a.price - b.price);
      else if (sort === 'price-high') products.sort((a,b) => b.price - a.price);
      else if (sort === 'popular') products.sort((a,b) => (b.sold||0) - (a.sold||0));

      document.getElementById('productGrid').innerHTML = products.map(p => `
        <div class="product-card" onclick="location.href='product.html?id=${p.id}'">
          <div class="product-img">${p.image ? `<img src="${p.image}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover">` : '📦'}</div>
          <div class="product-body">
            <div class="product-name">${p.name}</div>
            <div class="product-price">NT$${p.price}</div>
            <div class="product-meta">${p.stock > 0 ? `已售 ${p.sold || 0} 件` : '<span class="text-danger">缺貨</span>'}</div>
            <button class="btn btn-primary btn-sm btn-block mt-1" onclick="event.stopPropagation();addToCart('${p.id}')" ${p.stock===0?'disabled':''}>
              ${p.stock===0?'已售完':'加入購物車'}
            </button>
          </div>
        </div>
      `).join('') || '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔍</div><p>找不到商品</p></div>';
    }

    document.getElementById('categoryTabs').addEventListener('click', function(e) {
      if (e.target.classList.contains('filter-tab')) {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        selectedCat = e.target.dataset.cat;
        document.getElementById('catFilter').value = selectedCat;
        render();
      }
    });

    window.addToCart = function(productId) {
      const user = Auth.requireLogin();
      if (!user) return;
      const cart = DB.getCart(user.id);
      const existing = cart.find(c => c.productId === productId);
      if (existing) existing.qty++;
      else cart.push({ productId, qty: 1 });
      DB.setCart(user.id, cart);
      showToast('已加入購物車！');
    };

    document.getElementById('searchInput').addEventListener('input', render);
    document.getElementById('catFilter').addEventListener('change', function() { selectedCat = this.value; render(); });
    document.getElementById('sortFilter').addEventListener('change', render);
    render();

    function showToast(msg) {
      const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
      document.body.appendChild(t); setTimeout(()=>t.remove(),2500);
    }
  </script>
</body>
</html>
