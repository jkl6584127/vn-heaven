<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <div id="app">
    <div class="main-content">
      <div class="page-header">
        <h1>訂單管理</h1>
        <p>管理客戶訂單</p>
      </div>

      <div class="stats-grid" id="statsGrid"></div>

      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-status="">全部</button>
        <button class="filter-tab" data-status="pending">待處理</button>
        <button class="filter-tab" data-status="processing">處理中</button>
        <button class="filter-tab" data-status="shipped">已出貨</button>
        <button class="filter-tab" data-status="completed">已完成</button>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead><tr><th>訂單編號</th><th>客戶</th><th>商品</th><th>合計</th><th>狀態</th><th>日期</th><th>操作</th></tr></thead>
            <tbody id="orderTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="orderModal">
    <div class="modal">
      <div class="modal-header"><h2>訂單詳情</h2><button class="modal-close" onclick="document.getElementById('orderModal').classList.remove('show')">&times;</button></div>
      <div id="orderDetail"></div>
    </div>
  </div>

  <script src="../js/db.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    const me = Auth.requireRole(['merchant']);
    if (me) {
      initSidebar('merchant', 'orders.html');
      let currentFilter = '';

      const statusMap = {pending:'待處理',processing:'處理中',shipped:'已出貨',completed:'已完成',cancelled:'已取消'};
      const sb = s => {
        const m = {pending:'warning',processing:'info',shipped:'gold',completed:'success',cancelled:'danger'};
        return `<span class="badge badge-${m[s]||'info'}">${statusMap[s]||s}</span>`;
      };

      function render() {
        const allOrders = DB.getAll('orders').filter(o => o.merchantId === me.id);
        const users = DB.getAll('users');
        const filtered = currentFilter ? allOrders.filter(o => o.status === currentFilter) : allOrders;

        document.getElementById('statsGrid').innerHTML = `
          <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-value">${allOrders.length}</div><div class="stat-label">合計</div></div>
          <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-value">${allOrders.filter(o=>o.status==='pending').length}</div><div class="stat-label">待處理</div></div>
          <div class="stat-card"><div class="stat-icon">🚚</div><div class="stat-value">${allOrders.filter(o=>o.status==='shipped').length}</div><div class="stat-label">已出貨</div></div>
          <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value">${allOrders.filter(o=>o.status==='completed').length}</div><div class="stat-label">已完成</div></div>
        `;

        document.getElementById('orderTable').innerHTML = filtered.map(o => {
          const cu = users.find(u => u.id === o.userId);
          return `<tr>
            <td><strong>${o.id}</strong></td>
            <td>${cu ? cu.name : 'N/A'}</td>
            <td>${o.items.length} 件</td>
            <td class="text-gold">NT$${o.total}</td>
            <td>${sb(o.status)}</td>
            <td>${o.createdAt}</td>
            <td>
              <button class="btn btn-sm btn-secondary" onclick="viewOrder('${o.id}')">查看</button>
              ${o.status==='pending'?`<button class="btn btn-sm btn-success" onclick="updateStatus('${o.id}','processing')">處理</button>`:''}
              ${o.status==='processing'?`<button class="btn btn-sm btn-primary" onclick="updateStatus('${o.id}','shipped')">出貨</button>`:''}
            </td>
          </tr>`;
        }).join('') || '<tr><td colspan="7" class="text-center text-muted" style="padding:40px">查無訂單</td></tr>';
      }

      document.getElementById('filterTabs').addEventListener('click', function(e) {
        if (e.target.classList.contains('filter-tab')) {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
          e.target.classList.add('active');
          currentFilter = e.target.dataset.status;
          render();
        }
      });

      window.viewOrder = function(id) {
        const o = DB.findById('orders', id);
        const users = DB.getAll('users');
        const cu = users.find(u => u.id === o.userId);
        document.getElementById('orderDetail').innerHTML = `
          <p><strong>訂單編號：</strong> ${o.id}</p>
          <p><strong>客戶：</strong> ${cu?cu.name:'N/A'} (${cu?cu.phone:''})</p>
          <p><strong>地址：</strong> ${o.address}</p>
          <p><strong>狀態：</strong> ${sb(o.status)}</p>
          <table class="mt-2"><thead><tr><th>商品</th><th>數量</th><th>單價</th><th>小計</th></tr></thead><tbody>
          ${o.items.map(i=>`<tr><td>${i.name}</td><td>${i.qty}</td><td>NT$${i.price}</td><td>NT$${i.qty*i.price}</td></tr>`).join('')}
          </tbody></table>
          <p class="mt-2" style="font-size:1.1rem"><strong>合計：<span class="text-gold">NT$${o.total}</span></strong></p>
        `;
        document.getElementById('orderModal').classList.add('show');
      };

      window.updateStatus = function(id, status) {
        DB.update('orders', id, { status });
        render();
        showToast('訂單狀態已更新為' + statusMap[status]);
      };

      render();
    }

    function showToast(msg) {
      const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
      document.body.appendChild(t); setTimeout(()=>t.remove(),2500);
    }
  </script>
</body>
</html>
