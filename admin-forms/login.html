<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <base href="/admin-forms/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>後台登入 | VIT Investment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #C9A84C;
            --gold-light: #E8D48B;
            --dark: #0A0A0A;
            --dark-2: #141414;
            --dark-3: #1E1E1E;
            --dark-4: #2A2A2A;
            --white: #FFFFFF;
            --gray-100: #F5F5F5;
            --gray-200: #E0E0E0;
            --gray-400: #9E9E9E;
            --gray-600: #666666;
            --gradient-gold: linear-gradient(135deg, #C9A84C, #E8D48B, #C9A84C);
            --radius: 16px;
            --radius-sm: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --red: #e74c3c;
        }

        html { font-size: 16px; }

        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(201, 168, 76, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(201, 168, 76, 0.04) 0%, transparent 50%);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-brand .logo {
            font-size: 2rem;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 3px;
        }

        .login-brand .logo span {
            font-weight: 300;
            color: var(--white);
            font-size: 1rem;
            margin-left: 6px;
        }

        .login-brand p {
            color: var(--gray-400);
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .login-card {
            background: var(--dark-2);
            border: 1px solid var(--dark-4);
            border-radius: var(--radius);
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .login-card h2 {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-card .subtitle {
            color: var(--gray-400);
            font-size: 0.85rem;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gray-200);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            padding: 14px 16px;
            background: var(--dark-3);
            border: 2px solid var(--dark-4);
            border-radius: var(--radius-sm);
            color: var(--white);
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
        }

        .input-wrap input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(201, 168, 76, 0.1);
        }

        .input-wrap input::placeholder {
            color: var(--gray-600);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--gradient-gold);
            color: var(--dark);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1.05rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201, 168, 76, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-msg {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: var(--red);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .error-msg.show {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--gray-600);
            font-size: 0.8rem;
        }

        .login-footer a {
            color: var(--gold);
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-brand">
        <div class="logo">VIT <span>Investment</span></div>
        <p>表單管理後台</p>
    </div>

    <div class="login-card">
        <h2>管理員登入</h2>
        <p class="subtitle">請輸入帳號密碼以存取後台</p>

        <div class="error-msg" id="errorMsg">帳號或密碼錯誤，請重新輸入</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">帳號</label>
                <div class="input-wrap">
                    <input type="text" id="username" placeholder="請輸入帳號" required autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label for="password">密碼</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="請輸入密碼" required autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <span class="btn-text">登入</span>
                <span class="btn-loading" style="display:none;">驗證中...</span>
            </button>
        </form>
    </div>

    <div class="login-footer">
        <a href="/landing/">返回首頁</a>
    </div>
</div>

<script>
// If already logged in, redirect to admin
(function() {
    const token = sessionStorage.getItem('admin_token');
    if (token) {
        fetch('/api/auth/verify', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
        })
        .then(r => r.json())
        .then(data => { if (data.valid) window.location.href = '/admin-forms/'; });
    }
})();

const form = document.getElementById('loginForm');
const errorMsg = document.getElementById('errorMsg');
const loginBtn = document.getElementById('loginBtn');

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.classList.remove('show');

    const btnText = loginBtn.querySelector('.btn-text');
    const btnLoading = loginBtn.querySelector('.btn-loading');
    btnText.style.display = 'none';
    btnLoading.style.display = 'inline';
    loginBtn.disabled = true;

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
            }),
        });

        const data = await res.json();

        if (res.ok && data.token) {
            sessionStorage.setItem('admin_token', data.token);
            window.location.href = '/admin-forms/';
        } else {
            errorMsg.textContent = data.error || '登入失敗';
            errorMsg.classList.add('show');
        }
    } catch {
        errorMsg.textContent = '連線失敗，請稍後再試';
        errorMsg.classList.add('show');
    }

    btnText.style.display = 'inline';
    btnLoading.style.display = 'none';
    loginBtn.disabled = false;
});
</script>
</body>
</html>
