<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <base href="/admin-forms/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表單管理後台 | VIT Investment</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Top Bar -->
<header class="topbar">
    <div class="topbar-inner">
        <a href="/landing/" class="logo">VIT <span>Investment</span></a>
        <div class="topbar-right">
            <span class="topbar-label">表單管理後台</span>
        </div>
    </div>
</header>

<!-- Main Content -->
<main class="main">
    <div class="container">

        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-card-number" id="totalCount">—</div>
                <div class="stat-card-label">總表單數</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-number" id="unreadCount">—</div>
                <div class="stat-card-label">未讀</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-number" id="todayCount">—</div>
                <div class="stat-card-label">今日新增</div>
            </div>
        </div>

        <!-- Table Section -->
        <div class="table-section">
            <div class="table-header">
                <h2>諮詢表單紀錄</h2>
                <div class="table-actions">
                    <div class="search-box">
                        <span class="search-icon">&#128269;</span>
                        <input type="text" id="searchInput" placeholder="搜尋姓名、電話、LINE ID...">
                    </div>
                    <button class="btn-refresh" id="refreshBtn" title="重新整理">&#8635;</button>
                </div>
            </div>

            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th class="col-status"></th>
                            <th>姓名</th>
                            <th>電話</th>
                            <th>LINE ID</th>
                            <th>送出時間</th>
                            <th class="col-actions">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr class="empty-row">
                            <td colspan="6">載入中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</main>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
    <div class="modal-card">
        <div class="modal-header">
            <h3>表單詳情</h3>
            <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal-card modal-sm">
        <div class="modal-header">
            <h3>確認刪除</h3>
            <button class="modal-close" id="deleteModalClose">&times;</button>
        </div>
        <div class="modal-body">
            <p style="margin-bottom: 24px; color: var(--gray-200);">確定要刪除此筆諮詢紀錄嗎？此操作無法復原。</p>
            <div class="modal-actions">
                <button class="btn-cancel" id="deleteCancelBtn">取消</button>
                <button class="btn-delete-confirm" id="deleteConfirmBtn">確認刪除</button>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
